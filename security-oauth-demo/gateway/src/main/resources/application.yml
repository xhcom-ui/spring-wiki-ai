server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # 认证服务器路由
        - id: auth-server
          uri: http://localhost:9000
          predicates:
            - Path=/oauth2/**,/login/**,/logout/**
          filters:
            - StripPrefix=0
        # 资源服务器路由
        - id: resource-server
          uri: http://localhost:9001
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=0
            - TokenRelay=  # 传递 Token 到下游服务
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0

# OAuth2 资源服务器配置
spring.security.oauth2.resourceserver:
  jwt:
    issuer-uri: http://localhost:9000
