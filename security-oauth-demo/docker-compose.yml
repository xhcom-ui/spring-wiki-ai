version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  auth-server:
    build:
      context: ./auth-server
    container_name: auth-server
    restart: always
    ports:
      - "9000:9000"
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379

  resource-server:
    build:
      context: ./resource-server
    container_name: resource-server
    restart: always
    ports:
      - "9001:9001"
    depends_on:
      - auth-server
      - redis
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379

  gateway:
    build:
      context: ./gateway
    container_name: gateway
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - auth-server
      - resource-server
      - redis
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379

  client-app:
    build:
      context: ./client-app
    container_name: client-app
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - auth-server
      - gateway

volumes:
  postgres_data:
