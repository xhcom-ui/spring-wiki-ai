server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: spring-ai-structured-output

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      base-url: https://api.openai.com/v1
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.7
          max-tokens: 2000

logging:
  level:
    com.example.aistructured: DEBUG
    org.springframework.ai: DEBUG