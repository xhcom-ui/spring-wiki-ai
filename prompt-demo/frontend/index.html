<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt 管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Prompt 管理系统</h1>
        
        <!-- 创建/编辑 Prompt 模板 -->
        <div class="section">
            <h2>{{ editingPrompt ? '编辑 Prompt' : '创建 Prompt' }}</h2>
            <div class="form">
                <input type="text" v-model="prompt.name" placeholder="Prompt 名称">
                <textarea v-model="prompt.content" placeholder="Prompt 内容"></textarea>
                <input type="text" v-model="prompt.description" placeholder="Prompt 描述">
                <div class="form-buttons">
                    <button @click="savePrompt">{{ editingPrompt ? '更新' : '创建' }}</button>
                    <button @click="cancelEdit" v-if="editingPrompt">取消</button>
                </div>
            </div>
        </div>
        
        <!-- Prompt 模板列表 -->
        <div class="section">
            <h2>Prompt 模板列表</h2>
            <table>
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>描述</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="item in prompts" :key="item.id">
                        <td>{{ item.name }}</td>
                        <td>{{ item.description }}</td>
                        <td>{{ item.createdAt }}</td>
                        <td>
                            <button @click="editPrompt(item)">编辑</button>
                            <button @click="deletePrompt(item.id)">删除</button>
                            <button @click="showPromptContent(item)">查看</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 生成 Prompt 文本 -->
        <div class="section">
            <h2>生成 Prompt 文本</h2>
            <div class="form">
                <select v-model="selectedPromptId">
                    <option value="">选择 Prompt 模板</option>
                    <option v-for="item in prompts" :key="item.id" :value="item.id">{{ item.name }}</option>
                </select>
                <div v-if="selectedPrompt">
                    <div class="variables">
                        <div v-for="(variable, index) in variables" :key="index">
                            <input type="text" v-model="variables[index]" placeholder="变量 {{ index }}">
                        </div>
                        <button @click="addVariable">添加变量</button>
                    </div>
                    <button @click="generatePrompt">生成</button>
                </div>
                <div v-if="generatedText" class="generated-text">
                    <h3>生成的 Prompt 文本：</h3>
                    <pre>{{ generatedText }}</pre>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
