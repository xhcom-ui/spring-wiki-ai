version: '3.8'

services:
  openresty:
    image: openresty/openresty:latest
    container_name: openresty
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
      - ./html:/usr/local/openresty/nginx/html
      - ./logs:/usr/local/openresty/nginx/logs
    networks:
      - openresty-network

networks:
  openresty-network:
    driver: bridge
