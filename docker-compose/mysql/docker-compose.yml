version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: syn_data
      MYSQL_USER: syn_user
      MYSQL_PASSWORD: syn_pass
    ports:
      - "3306:3306"
    volumes:
      - ./data:/var/lib/mysql
      - ./conf/my.cnf:/etc/mysql/my.cnf
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - mysql-network

networks:
  mysql-network:
    driver: bridge
