version: '3.8'

services:
  nginx:
    image: nginx:1.23
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
      - ./html:/usr/share/nginx/html
      - ./logs:/var/log/nginx
    networks:
      - nginx-network

networks:
  nginx-network:
    driver: bridge
