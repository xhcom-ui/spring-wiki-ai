version: '3.8'

services:
  cloudreve:
    image: cloudreve/cloudreve:latest
    container_name: cloudreve
    restart: always
    ports:
      - "5212:5212"
    volumes:
      - ./data:/data
      - ./uploads:/uploads
    networks:
      - cloudreve-network

networks:
  cloudreve-network:
    driver: bridge
