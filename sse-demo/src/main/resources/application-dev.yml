# 开发环境配置
spring:
  jackson:
    serialization:
      indent-output: true
  data:
    redis:
      host: localhost
      port: 6379

app:
  sse:
    timeout: 30000
    heartbeat-message: ping
  idempotent:
    enabled: false

logging:
  level:
    org.wiki: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.redis: DEBUG
