version: '3.8'

services:
  backend:
    build:
      context: ./syn-data-demo/backend
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/syn_data?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - ELASTICSEARCH_HOSTS=elasticsearch:9200
    depends_on:
      - mysql
      - elasticsearch

  frontend:
    build:
      context: ./syn-data-demo/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=syn_data
    volumes:
      - ./syn-data-demo/backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  elasticsearch:
    image: elasticsearch:8.11.0
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
