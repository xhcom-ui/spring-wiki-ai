<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama 本地模型调用</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Ollama 本地模型调用</h1>
        
        <!-- 模型选择 -->
        <div class="section">
            <h2>模型选择</h2>
            <div class="form">
                <select v-model="selectedModel">
                    <option v-for="model in models" :key="model.name" :value="model.name">
                        {{ model.name }} ({{ model.size }})
                    </option>
                </select>
                <button @click="loadModels">刷新模型列表</button>
            </div>
        </div>
        
        <!-- 文本生成 -->
        <div class="section">
            <h2>文本生成</h2>
            <div class="form">
                <textarea v-model="generatePrompt" placeholder="输入 prompt..."></textarea>
                <button @click="generateText" :disabled="loading">
                    {{ loading ? '生成中...' : '生成' }}
                </button>
                <div v-if="generateResponse" class="response">
                    <h3>生成结果：</h3>
                    <p>{{ generateResponse }}</p>
                </div>
            </div>
        </div>
        
        <!-- 聊天模式 -->
        <div class="section">
            <h2>聊天模式</h2>
            <div class="chat-container">
                <div class="chat-messages">
                    <div v-for="(message, index) in chatMessages" :key="index" :class="['message', message.role]">
                        <div class="message-content">{{ message.content }}</div>
                    </div>
                </div>
                <div class="chat-input">
                    <textarea v-model="chatMessage" placeholder="输入消息..."></textarea>
                    <button @click="sendMessage" :disabled="loading">
                        {{ loading ? '发送中...' : '发送' }}
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
