spring:
  application:
    name: syn-data-backend
  
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/syn_data?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-on-borrow: false
      test-while-idle: true
      validation-query: SELECT 1

  # MyBatis-Plus配置
  mybatis-plus:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: com.syn.data.entity
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 服务器配置
server:
  port: 8080

# XXL-Job配置
xxl:
  job:
    admin:
      addresses: http://localhost:8080/xxl-job-admin
    executor:
      appname: syn-data-executor
      ip:
      port: 9999
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30
    accessToken: default_token

# Elasticsearch配置
elasticsearch:
  hosts: localhost:9200
  username: 
  password: 
  connect-timeout: 5000
  socket-timeout: 30000

# Sa-Token配置
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: so-token
  # token有效期（单位：秒）
  timeout: 86400
  # token临时有效期（单位：秒）
  activity-timeout: -1
  # 是否允许同一账号多处登录
  is-concurrent: true
  # 同一账号最大登录数
  max-login-count: 10
  # token风格
  token-style: uuid

# 同步任务配置
sync:
  task:
    # 批次大小
    batch-size: 1000
    # 并发线程数
    concurrency: 4
    # 失败重试次数
    retry-times: 3
    # 重试间隔（秒）
    retry-interval: 5

# 日志配置
logging:
  level:
    com.syn.data: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
