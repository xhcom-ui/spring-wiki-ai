server:
  port: 8080

spring:
  application:
    name: sa-token-demo
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0

sa-token:
  token-name: satoken
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true

# API Key 配置
api-key:
  prefix: sk-
  length: 32
  expire: 31536000
