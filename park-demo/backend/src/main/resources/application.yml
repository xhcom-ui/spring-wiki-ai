spring:
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/park_demo?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0

  # Kafka配置
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: park-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# MQTT配置
mqtt:
  broker: tcp://localhost:1883
  clientId: park-gateway
  username:
  password:
  topic: parking/sensor/data

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 日志配置
logging:
  level:
    com.park: info

# 自定义配置
parking:
  # 防抖时间（毫秒）
  debounce-time: 3000
  # 去重时间窗口（毫秒）
  dedup-window: 5000
  # 区域聚合间隔（毫秒）
  aggregate-interval: 1000
